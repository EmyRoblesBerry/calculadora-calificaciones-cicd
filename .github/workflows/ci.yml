name: Integración Continua (CI)

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verificar:
    name: Validar y Construir
    runs-on: ubuntu-latest

    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v7

      - name: Preparar Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Ejecutar validaciones y pruebas
        run: npm run verify
